<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIO-FIT — Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f5f0 0%, #d4eee6 40%, #c8eadf 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0d2e1e;
            letter-spacing: -1px;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(13, 46, 30, 0.08);
        }

        h1 { font-size: 1.5rem; color: #0d2e1e; margin-bottom: 8px; text-align: center; }
        p.subtitle { color: #4a7060; font-size: 0.95rem; text-align: center; margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #0d2e1e; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid #e0eadd;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus { outline: none; border-color: #2d7a4f; background: #f8fdf9; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #0d2e1e;
            color: #a8e063;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover { background: #1a4f33; transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #dcfce7; color: #166534; }

        .footer-link { text-align: center; margin-top: 24px; font-size: 0.9rem; color: #4a7060; }
        .footer-link a { color: #2d7a4f; font-weight: 600; text-decoration: none; }
    </style>
</head>

<body>
    <div class="brand">
        <span class="logo-text">BIO-FIT</span>
    </div>

    <div class="login-card">
        <h1>Bienvenido</h1>
        <p class="subtitle">Ingresa tus credenciales para continuar</p>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submitBtn" class="btn-submit">Entrar</button>
        </form>

        <div class="footer-link">
            ¿No tienes cuenta? <a href="/registro/">Regístrate aquí</a>
        </div>
    </div>

    <script>
        function showAlert(msg, type = 'error') {
            const el = document.getElementById('alertBox');
            el.className = 'alert ' + (type === 'error' ? 'alert-error' : 'alert-success');
            el.textContent = msg;
            el.style.display = 'flex';
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            btn.textContent = 'Cargando...';
            btn.disabled = true;

            try {
                // Petición al endpoint limpio centralizado del proyecto
                const res = await fetch('/api/login/', { 
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Credenciales incorrectas');
                }

                // Guardar las llaves exactas en memoria local
                localStorage.setItem('biofit_token', data.token);
                localStorage.setItem('biofit_uid', data.uid);
                localStorage.setItem('biofit_email', email);
                localStorage.setItem('biofit_rol', data.rol); 

                showAlert('¡Acceso concedido! Entrando...', 'success');

                setTimeout(() => {
                    window.location.href = '/'; 
                }, 1000);

            } catch (err) {
                showAlert(err.message);
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
