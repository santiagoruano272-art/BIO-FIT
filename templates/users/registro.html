<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIO-FIT — Crear Cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f5f0 0%, #d4eee6 40%, #c8eadf 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Brand ── */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            box-shadow: 0 4px 16px rgba(39, 174, 96, .3);
            letter-spacing: 0.5px;
        }

        .brand-name {
            font-size: 22px;
            font-weight: 700;
            color: #27ae60;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .brand-sub {
            font-size: 13px;
            color: #6b7280;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 32px rgba(0, 0, 0, .08);
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        /* ── Alert ── */
        .alert {
            display: none;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            align-items: flex-start;
            gap: 8px;
        }

        .alert.error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            display: flex;
        }

        .alert.success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            display: flex;
        }

        /* ── Fields ── */
        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .input-wrap input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: #f3f4f6;
            border: 1.5px solid transparent;
            border-radius: 10px;
            color: #111827;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .2s, background .2s;
        }

        .input-wrap input:focus {
            border-color: #27ae60;
            background: #fff;
        }

        .input-wrap input::placeholder {
            color: #9ca3af;
        }

        .toggle-pw {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .toggle-pw:hover {
            color: #6b7280;
        }

        /* ── Button ── */
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
            box-shadow: 0 4px 14px rgba(39, 174, 96, .35);
        }

        .btn-primary:hover {
            opacity: .92;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: .65;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: none;
        }

        .btn-primary.loading .spinner {
            display: block;
        }

        .btn-primary.loading .btn-text {
            display: none;
        }

        .btn-primary.loading .btn-icon {
            display: none;
        }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #6b7280;
        }

        .card-footer a {
            color: #27ae60;
            font-weight: 600;
            text-decoration: none;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="brand">
        <div class="logo-icon">BF</div>
        <div class="brand-name">BIO-FIT</div>
        <div class="brand-sub">Comienza tu viaje hacia una vida más saludable</div>
    </div>
    <div class="card">
        <h1 class="card-title">Crear Cuenta</h1>
        <p class="card-sub">Completa tus datos para registrarte en BIO-FIT</p>
        <div class="alert" id="alert"></div>
        <form id="registroForm" novalidate> {% csrf_token %} <!-- Nombre Completo -->
            <div class="field"> <label for="nombre">Nombre Completo</label>
                <div class="input-wrap"> <span class="icon"> <svg width="16" height="16" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="1.8">
                            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg> </span> <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez"
                        autocomplete="name" /> </div>
            </div> <!-- Correo -->
            <div class="field"> <label for="email">Correo Electrónico</label>
                <div class="input-wrap"> <span class="icon"> <svg width="16" height="16" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="1.8">
                            <path
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg> </span> <input type="email" id="email" name="email" placeholder="tu@email.com"
                        autocomplete="email" required /> </div>
            </div> <!-- Teléfono -->
            <div class="field"> <label for="telefono">Teléfono</label>
                <div class="input-wrap"> <span class="icon"> <svg width="16" height="16" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="1.8">
                            <path
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg> </span> <input type="tel" id="telefono" name="telefono" placeholder="+57 300 123 4567"
                        autocomplete="tel" /> </div>
            </div> <!-- Contraseña -->
            <div class="field"> <label for="password">Contraseña</label>
                <div class="input-wrap"> <span class="icon"> <svg width="16" height="16" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="1.8">
                            <path
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg> </span> <input type="password" id="password" name="password" placeholder="••••••••"
                        autocomplete="new-password" required /> <button type="button" class="toggle-pw" id="togglePw1"
                        aria-label="Ver contraseña"> <svg id="eye1" width="16" height="16" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg> </button> </div>
            </div> <!-- Confirmar Contraseña -->
            <div class="field"> <label for="password2">Confirmar Contraseña</label>
                <div class="input-wrap"> <span class="icon"> <svg width="16" height="16" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="1.8">
                            <path
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg> </span> <input type="password" id="password2" name="password2" placeholder="••••••••"
                        autocomplete="new-password" required /> <button type="button" class="toggle-pw" id="togglePw2"
                        aria-label="Ver contraseña"> <svg id="eye2" width="16" height="16" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg> </button> </div>
            </div> <button type="submit" class="btn-primary" id="submitBtn">
                <div class="spinner"></div> <span class="btn-icon"> <svg width="16" height="16" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg> </span> <span class="btn-text">Crear Cuenta</span>
            </button>
        </form>
        <div class="card-footer"> ¿Ya tienes cuenta? <a href="/login/">Inicia sesión aquí</a> </div>
    </div>
    <script> function makePwToggle(btnId, inputId, iconId) { document.getElementById(btnId).addEventListener('click', () => { const inp = document.getElementById(inputId); const ico = document.getElementById(iconId); const show = inp.type === 'password'; inp.type = show ? 'text' : 'password'; ico.innerHTML = show ? '<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>' : '<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>'; }); } makePwToggle('togglePw1', 'password', 'eye1'); makePwToggle('togglePw2', 'password2', 'eye2'); function showAlert(msg, type = 'error') { const el = document.getElementById('alert'); const icon = type === 'error' ? '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>' : '<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'; el.className = 'alert ' + type; el.innerHTML = icon + '<span>' + msg + '</span>'; el.style.display = 'flex'; } function getCookie(name) { const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)'); return v ? v[2] : null; } document.getElementById('registroForm').addEventListener('submit', async (e) => { e.preventDefault(); const email = document.getElementById('email').value.trim(); const password = document.getElementById('password').value; const password2 = document.getElementById('password2').value; const nombre = document.getElementById('nombre').value.trim(); const telefono = document.getElementById('telefono').value.trim(); const btn = document.getElementById('submitBtn'); // Validaciones if (!email || !password || !password2) { showAlert('Los campos de correo y contraseña son obligatorios.'); return; } const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; if (!emailRe.test(email)) { showAlert('Ingresa un correo electrónico válido.'); return; } if (password.length < 6) { showAlert('La contraseña debe tener al menos 6 caracteres.'); return; } if (password !== password2) { showAlert('Las contraseñas no coinciden.'); return; } btn.classList.add('loading'); btn.disabled = true; try { // 1. Registrar usuario const regRes = await fetch('/api/users/api/register/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') }, body: JSON.stringify({ email, password }), }); const regData = await regRes.json(); if (!regRes.ok) { showAlert(regData.error || 'Error al crear la cuenta.'); return; } // 2. Login automático para obtener token const loginRes = await fetch('/api/users/api/login/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') }, body: JSON.stringify({ email, password }), }); const loginData = await loginRes.json(); if (loginRes.ok && loginData.token) { localStorage.setItem('biofit_token', loginData.token); localStorage.setItem('biofit_uid', loginData.uid); // 3. Guardar datos adicionales del perfil si existen if (nombre || telefono) { fetch('/api/users/profile/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken'), 'Authorization': 'Bearer ' + loginData.token, }, body: JSON.stringify({ nombre, telefono }), }).catch(() => {}); } } showAlert('¡Cuenta creada exitosamente! Redirigiendo...', 'success'); setTimeout(() => { window.location.href = '/api/users/profile/'; }, 1400); } catch { showAlert('Error de conexión. Intenta de nuevo.'); } finally { btn.classList.remove('loading'); btn.disabled = false; } }); </script>
</body>

</html>
