{% extends 'base.html' %}

{% block content %}
<h2>Calorías</h2>

<p>Consumo diario: {{ calorias }}</p>

<form method="POST">
    {% csrf_token %}
    <input type="number" name="peso" placeholder="Peso">
    <input type="number" name="altura" placeholder="Altura">
    <button type="submit">Calcular</button>
</form>

{% endblock %}
