{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'styles.css' %}">

<style>
    .routine-results { margin-top: 30px; text-align: left; }
    .day-container { 
        background: #ffffff; 
        border-radius: 15px; 
        padding: 20px; 
        margin-bottom: 25px; 
        border-left: 5px solid #2d7a4f; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .day-title { color: #0d2e1e; font-family: 'Syne', sans-serif; margin-bottom: 15px; }
    .exercise-card {
        background: #f9fdfb;
        border: 1px solid #e0eee6;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 10px;
    }
    .btn-save-routine {
        background-color: #2d7a4f;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 25px;
        transition: background-color 0.3s;
    }
    .btn-save-routine:hover {
        background-color: #1e5335;
    }
</style>

<div style="max-width: 800px; margin: 50px auto; padding: 20px; text-align: center;">
    <h1 style="color: #0d2e1e; font-family: 'Syne', sans-serif; font-size: 36px; margin-bottom: 10px;">
        Generador de Rutinas Inteligente
    </h1>
    <p style="color: #555; font-size: 16px; margin-bottom: 40px;">
        Configura tus preferencias y nuestro BioFit Coach creará un plan de entrenamiento estructurado y adaptado a tus objetivos.
    </p>

    <form id="routineForm" onsubmit="procesarGeneracion(event)" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left;">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label for="level" style="display: block; font-weight: bold; margin-bottom: 8px; color: #0d2e1e;">Nivel de Experiencia:</label>
            <select id="level" name="level" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px;">
                <option value="principiante">Principiante (Menos de 6 meses)</option>
                <option value="intermedio">Intermedio (6 meses a 2 años)</option>
                <option value="avanzado">Avanzado (Más de 2 años)</option>
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label for="goal" style="display: block; font-weight: bold; margin-bottom: 8px; color: #0d2e1e;">Objetivo Principal:</label>
            <select id="goal" name="goal" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px;">
                <option value="perder_peso">Perder Peso / Definición</option>
                <option value="ganar_musculo">Ganar Masa Muscular (Hipertrofia)</option>
                <option value="fuerza">Aumento de Fuerza Máxima</option>
                <option value="resistencia">Mejora Cardiovascular y Resistencia</option>
            </select>
        </div>

        <div style="margin-bottom: 30px;">
            <label for="days" style="display: block; font-weight: bold; margin-bottom: 8px; color: #0d2e1e;">Días de Entrenamiento por Semana:</label>
            <select id="days" name="days" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px;">
                <option value="3">3 Días a la semana</option>
                <option value="4">4 Días a la semana</option>
                <option value="5">5 Días a la semana</option>
            </select>
        </div>

        <!-- Badge de contexto: gimnasio asignado o modo casa -->
        <div id="gym-context-badge" style="display:flex; align-items:center; gap:10px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; padding:12px 15px; margin-bottom:20px; font-size:13.5px; color:#15803d;">
            <span style="font-size:20px;" id="gym-badge-icon">⏳</span>
            <span id="gym-badge-text">Consultando tu gimnasio asignado…</span>
        </div>

        <button type="submit" id="btnSubmit" style="width: 100%; background: #2d7a4f; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.3s;">
            ✨ Generar Mi Plan Personalizado
        </button>
    </form>

    <div id="routineContent" class="routine-results"></div>
</div>

<script>
    let rutinaActual = null;

    // ── Badge: muestra el gimnasio/modo activo del usuario ──────────────────
    async function cargarContextoGimnasio() {
        const badge  = document.getElementById('gym-context-badge');
        const icon   = document.getElementById('gym-badge-icon');
        const text   = document.getElementById('gym-badge-text');
        try {
            const res  = await fetch('/inventory/api/gimnasios/contexto/');
            const data = await res.json();
            if (data.gym_id && data.gym_nombre) {
                icon.textContent = '🏋️';
                text.innerHTML   = `Rutina adaptada al inventario de <strong>${data.gym_nombre}</strong> — solo se usarán los equipos disponibles allí.`;
                badge.style.background = '#f0fdf4';
                badge.style.borderColor = '#bbf7d0';
                badge.style.color = '#15803d';
            } else {
                icon.textContent = '🏠';
                text.textContent = 'No tienes un gimnasio asignado — tu rutina usará ejercicios con peso corporal.';
                badge.style.background = '#fffbeb';
                badge.style.borderColor = '#fde68a';
                badge.style.color = '#92400e';
            }
        } catch (_) {
            icon.textContent = '⚠️';
            text.textContent = 'No se pudo verificar tu gimnasio. La rutina se generará con equipamiento general.';
            badge.style.background = '#fef2f2';
            badge.style.borderColor = '#fecaca';
            badge.style.color = '#991b1b';
        }
    }
    cargarContextoGimnasio();

    function getAuthToken() {
        return localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
    }

    async function procesarGeneracion(e) {
        e.preventDefault(); 
        
        const btn = document.getElementById('btnSubmit');
        const content = document.getElementById('routineContent');
        
        const level = document.getElementById('level').value;
        const goal = document.getElementById('goal').value;
        const days = document.getElementById('days').value;

        btn.textContent = "🧠 Pensando tu rutina ideal...";
        btn.disabled = true;
        content.innerHTML = `
            <div style="text-align: center; padding: 40px;">
                <p style="color: #666; font-size: 16px;">Generando tu estructura de entrenamiento de forma inteligente, por favor espera...</p>
            </div>
        `;

        try {
            const token = getAuthToken();
            const headers = {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            };
            if(token) {
                headers['Authorization'] = 'Bearer ' + token;
            }

            const response = await fetch("{% url 'routines:api_generate' %}", {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ nivel: level, objetivo: goal, dias: days })
            });

            const data = await response.json();

            if (response.ok && data.rutina) {
                rutinaActual = data.rutina;
                renderRutina(data.rutina);
            } else {
                content.innerHTML = `
                    <div style="background: #fdf2f2; border: 1px solid #f8b4b4; padding: 15px; border-radius: 10px; color: #9b1c1c;">
                        ⚠️ <strong>Error del servidor:</strong> ${data.error || 'No se recibió un objeto de rutina válido.'}
                    </div>
                `;
            }
        } catch (err) {
            console.error(err);
            content.innerHTML = `
                <div style="background: #fdf2f2; border: 1px solid #f8b4b4; padding: 15px; border-radius: 10px; color: #9b1c1c;">
                    ⚠️ Ocurrió un problema de red al procesar o renderizar los datos de tu rutina.
                </div>
            `;
        } finally {
            btn.textContent = "✨ Generar Mi Plan Personalizado";
            btn.disabled = false;
        }
    }

    function renderEjercicios(lista) {
        if (!Array.isArray(lista) || lista.length === 0) {
            return '<p style="color:#888; font-size:13px;">Sin ejercicios para esta fase.</p>';
        }
        return lista.map(ej => `
            <div class="exercise-card">
                <h4 style="color:#2d7a4f; margin:0 0 8px 0; font-size:17px;">${ej.ejercicio}</h4>
                <p style="margin:4px 0; color:#444; font-size:13.5px;">
                    <strong>🔢 Series:</strong> ${ej.series} &nbsp;|&nbsp;
                    <strong>🔁 Reps:</strong> ${ej.repeticiones} &nbsp;|&nbsp;
                    <strong>⏱️ Descanso:</strong> ${ej.descanso}
                </p>
                ${ej.nota ? `<p style="margin:6px 0 0 0; color:#555; font-size:12.5px; font-style:italic; background:#f1f8f4; padding:7px 10px; border-radius:6px;">💡 <strong>Nota:</strong> ${ej.nota}</p>` : ''}
            </div>
        `).join('');
    }

    function renderRutina(rutina) {
        const content = document.getElementById('routineContent');
        const dias = rutina.dias || [];

        if (dias.length === 0) {
            content.innerHTML = '<p style="color:#888;">No se generaron días de entrenamiento.</p>';
            return;
        }

        // ── Pestañas de días ──────────────────────────────────────────────────
        const tabsBtns = dias.map((dia, i) => `
            <button onclick="mostrarDia(${i})" id="tab-btn-${i}"
                style="padding:9px 18px; border:none; border-radius:8px; cursor:pointer; font-weight:600;
                       font-size:13.5px; transition:all .2s;
                       background:${i === 0 ? '#2d7a4f' : '#e8f5ee'};
                       color:${i === 0 ? '#fff' : '#2d7a4f'};">
                ${dia.dia}
            </button>
        `).join('');

        const diasHtml = dias.map((dia, i) => `
            <div id="dia-panel-${i}" style="display:${i === 0 ? 'block' : 'none'};">
                ${dia.enfoque ? `<p style="color:#6b7280; font-size:13px; margin:0 0 18px 0; font-weight:500;">🎯 Enfoque: <strong style="color:#2d7a4f;">${dia.enfoque}</strong></p>` : ''}

                <div class="day-container">
                    <h3 class="day-title">🔥 Calentamiento</h3>
                    ${renderEjercicios(dia.calentamiento)}
                </div>
                <div class="day-container">
                    <h3 class="day-title">💪 Entrenamiento Principal</h3>
                    ${renderEjercicios(dia.entrenamiento_principal)}
                </div>
                <div class="day-container">
                    <h3 class="day-title">🧘 Estiramiento</h3>
                    ${renderEjercicios(dia.estiramiento)}
                </div>
            </div>
        `).join('');

        content.innerHTML = `
            <div style="text-align:right; margin-bottom:20px;">
                <button id="btnSave" onclick="guardarRutina()" class="btn-save-routine">
                    💾 Activar y Guardar esta Rutina
                </button>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">
                ${tabsBtns}
            </div>
            ${diasHtml}
        `;
    }

    function mostrarDia(idx) {
        document.querySelectorAll('[id^="dia-panel-"]').forEach((el, i) => {
            el.style.display = i === idx ? 'block' : 'none';
        });
        document.querySelectorAll('[id^="tab-btn-"]').forEach((btn, i) => {
            btn.style.background = i === idx ? '#2d7a4f' : '#e8f5ee';
            btn.style.color      = i === idx ? '#fff'    : '#2d7a4f';
        });
    }

    async function guardarRutina() {
        if(!rutinaActual) return;
        
        const btn = document.getElementById('btnSave');
        const usuarioAutenticado = "{% if user.is_authenticated %}true{% else %}false{% endif %}";

        if (usuarioAutenticado !== "true") {
            alert("Para guardar tu plan necesitas estar identificado.");
            window.location.href = "{% url 'login' %}";
            return;
        }

        btn.textContent = "💾 Guardando en tu perfil...";
        btn.disabled = true;

        const level = document.getElementById('level').value;
        const goal = document.getElementById('goal').value;
        const days = document.getElementById('days').value;

        try {
            const token = getAuthToken();
            const headers = {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            };
            
            if(token) {
                headers['Authorization'] = 'Bearer ' + token;
            }

            const response = await fetch("{% url 'routines:api_save' %}", {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({
                    rutina: rutinaActual,
                    inputs: { nivel: level, objetivo: goal, dias: days }
                })
            });

            const resData = await response.json();

            if (response.ok && resData.success) {
                alert("¡Plan guardado con éxito! Redirigiendo al detalle de tu rutina...");
                // CORRECCIÓN AQUÍ: Cambiado de /inicio/ a la URL de detalle asignada
                window.location.href = "{% url 'routines:detail' %}"; 
            } else {
                alert("No se pudo guardar la rutina: " + (resData.error || "Sesión inválida"));
            }
        } catch (e) {
            alert("Error de red al intentar conectar con la base de datos.");
            console.error(e);
        } finally {
            btn.textContent = "💾 Activar y Guardar esta Rutina";
            btn.disabled = false;
        }
    }
</script>
{% endblock %}
