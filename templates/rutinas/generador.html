{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'styles.css' %}">

<style>
    /* Estilos para las tarjetas de la rutina */
    .routine-results { margin-top: 30px; text-align: left; }
    
    .day-container { 
        background: #ffffff; 
        border-radius: 15px; 
        padding: 20px; 
        margin-bottom: 25px; 
        border-left: 5px solid #2d7a4f; /* var(--green-main) */
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    
    .day-title { color: #0d2e1e; font-family: 'Syne', sans-serif; margin-bottom: 15px; }

    .exercise-card {
        background: #f9fdfb;
        border: 1px solid #e0eee6;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .exercise-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .exercise-name { font-weight: 700; color: #2d7a4f; font-size: 1.1rem; }
    
    .exercise-stats { display: flex; gap: 10px; font-size: 0.85rem; color: #666; }
    .stat-item { background: #eef7f1; padding: 2px 8px; border-radius: 5px; border: 1px solid #d4eadc; }
    
    .exercise-instructions { font-size: 0.9rem; color: #444; margin: 5px 0; line-height: 1.4; }
    
    .nutrition-section {
        background: #fffdf5;
        border-radius: 15px;
        padding: 20px;
        border-left: 5px solid #a8e063;
        margin-top: 20px;
    }
</style>

<div class="generator-container">
    <div class="form-card">
        <h1>Configura tu Rutina con IA</h1>
        <p>Cuéntanos cómo quieres entrenar hoy y BIO-FIT hará el resto.</p>
        
        <form id="routineForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="goal">Objetivo Principal</label>
                <select id="goal" name="main_goal">
                    <option value="perder_peso">Perder Peso</option>
                    <option value="ganar_musculo">Ganar Músculo</option>
                    <option value="fuerza">Fuerza</option>
                    <option value="resistencia">Resistencia / Cardio</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="days">Días por semana</label>
                <input type="number" id="days" name="days_per_week" min="1" max="7" value="3">
            </div>

            <button type="submit" class="btn-generate" id="btnSubmit">Generar Rutina Mágica</button>
        </form>

        <div id="routine-container" style="display: none;"></div>
    </div>
</div>

<script>
document.getElementById('routineForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const btn = document.getElementById('btnSubmit');
    const container = document.getElementById('routine-container');
    
    btn.textContent = "La IA está trabajando...";
    btn.disabled = true;
    container.style.display = 'none';

    try {
        const response = await fetch("{% url 'routines:api_generate' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({
                main_goal: document.getElementById('goal').value,
                days_per_week: document.getElementById('days').value
            })
        });

        if (!response.ok) throw new Error(`Error en el servidor: ${response.status}`);

        const data = await response.json();

        if(data.success && data.routine) {
            renderRoutine(data.routine);
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth' });
        } else {
            alert("Algo salió mal: " + (data.error || "Error desconocido"));
        }
    } catch (error) {
        console.error("Error:", error);
        alert("No se pudo conectar con la IA. Revisa la terminal.");
    } finally {
        btn.textContent = "Generar Rutina Mágica";
        btn.disabled = false;
    }
});

function renderRoutine(rutina) {
    const container = document.getElementById('routine-container');
    
    let html = `
        <div class="routine-results">
            <h2 style="text-align:center; color:#0d2e1e; margin-bottom:10px;">${rutina.routine_name}</h2>
            <p style="text-align:center; color: #666; margin-bottom:30px;">🎯 ${rutina.objective}</p>
    `;

    // Procesar los días de entrenamiento
    if (rutina.main_workout) {
        rutina.main_workout.forEach(dia => {
            html += `
                <div class="day-container">
                    <h3 class="day-title">📅 ${dia.day_name}</h3>
            `;

            dia.exercises.forEach(ex => {
                html += `
                    <div class="exercise-card">
                        <div class="exercise-header">
                            <span class="exercise-name">${ex.name}</span>
                            <div class="exercise-stats">
                                <span class="stat-item"><b>Sets:</b> ${ex.sets}</span>
                                <span class="stat-item"><b>Reps:</b> ${ex.reps}</span>
                                <span class="stat-item"><b>Descanso:</b> ${ex.rest_seconds}s</span>
                            </div>
                        </div>
                        <p class="exercise-instructions">📝 ${ex.instructions}</p>
                        <small style="color: #2d7a4f; font-weight:600;">💪 Grupo: ${ex.muscle_group.toUpperCase()}</small>
                    </div>
                `;
            });

            html += `</div>`;
        });
    }

    // Tips de Nutrición
    if (rutina.nutrition_tips && rutina.nutrition_tips.length > 0) {
        html += `
            <div class="nutrition-section">
                <h3 class="day-title">🍎 Tips de Nutrición</h3>
                <ul style="padding-left: 20px;">
                    ${rutina.nutrition_tips.map(tip => `<li style="margin-bottom:8px;">${tip}</li>`).join('')}
                </ul>
            </div>
        `;
    }

    html += `</div>`;
    container.innerHTML = html;
}
</script>
{% endblock %}
