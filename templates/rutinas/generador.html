{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'styles.css' %}">

<div class="generator-container">
    <div class="form-card">
        <h1>Configura tu Rutina con IA</h1>
        <p>Cuéntanos cómo quieres entrenar hoy y BIO-FIT hará el resto.</p>
        
        <form id="routineForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="goal">Objetivo Principal</label>
                <select id="goal" name="main_goal">
                    <option value="perder_peso">Perder Peso</option>
                    <option value="ganar_musculo">Ganar Músculo</option>
                    <option value="fuerza">Fuerza</option>
                    <option value="resistencia">Resistencia / Cardio</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="days">Días por semana</label>
                <input type="number" id="days" name="days_per_week" min="1" max="7" value="3">
            </div>

            <button type="submit" class="btn-generate" id="btnSubmit">Generar Rutina Mágica</button>
        </form>

        <div id="result" style="margin-top: 30px; display: none;">
            <h3>Tu rutina personalizada:</h3>
            <pre id="routineOutput"></pre>
        </div>
    </div>
</div>

<script>
document.getElementById('routineForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const btn = document.getElementById('btnSubmit');
    const resultDiv = document.getElementById('result');
    const output = document.getElementById('routineOutput');
    
    // Estado de carga
    btn.textContent = "La IA está trabajando...";
    btn.disabled = true;
    resultDiv.style.display = 'none';

    try {
        const response = await fetch("{% url 'routines:api_generate' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({
                main_goal: document.getElementById('goal').value,
                days_per_week: document.getElementById('days').value
            })
        });

        if (!response.ok) {
            throw new Error(`Error en el servidor: ${response.status}`);
        }

        const data = await response.json();
        console.log("Respuesta de BIO-FIT:", data);

        if(data.success) {
            resultDiv.style.display = 'block';
            
            // Verificamos si la rutina es un objeto o texto
            if (typeof data.routine === 'object') {
                // Formateamos el JSON para que se vea bonito (2 espacios de sangría)
                output.textContent = JSON.stringify(data.routine, null, 2);
            } else {
                output.textContent = data.routine;
            }
            
            // Scroll suave hacia el resultado
            resultDiv.scrollIntoView({ behavior: 'smooth' });
            
        } else {
            alert("Algo salió mal: " + (data.error || "Error desconocido"));
        }
    } catch (error) {
        console.error("Error en la petición Fetch:", error);
        alert("No se pudo conectar con la IA. Revisa la terminal de Django.");
    } finally {
        btn.textContent = "Generar Rutina Mágica";
        btn.disabled = false;
    }
});
</script>
{% endblock %}
