{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/registrar_gimnasio.css' %}">
{% endblock %}

{% block content %}
<div class="gym-register-page">
    <h2>Registrar Nuevo Gimnasio 🏢</h2>
    <p>Da de alta sedes principales del ecosistema para segmentar sus equipamientos independientes.</p>
    
    <form id="form-gym" class="gym-register-form" data-endpoint="{% url 'inventory:api_crear_gimnasio' %}">
        <div class="gym-register-group">
            <label>Nombre de la Sede:</label>
            <input type="text" id="gym-name" required class="gym-register-input">
        </div>
        <div class="gym-register-group">
            <label>Dirección / Ubicación:</label>
            <input type="text" id="gym-location" required class="gym-register-input">
        </div>
        <div class="gym-register-group">
            <label>Teléfono de Contacto:</label>
            <input type="text" id="gym-phone" class="gym-register-input">
        </div>
        <button type="submit" class="gym-register-button">Guardar Colección Principal</button>
    </form>
    <div id="msg" class="gym-register-message"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/registrar_gimnasio.js' %}"></script>
{% endblock %}
